<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Breadcrumb Section -->
<div class="container mt-4">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb bg-light p-2 rounded">
      <li class="breadcrumb-item"><a href="index.html">Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Shopping Cart</li>
    </ol>
  </nav>
</div>

<!-- Cart Main Section -->
<div class="container my-4">
  <div class="row g-4">
    <!-- Cart Product List -->
    <div class="col-lg-8">
      <h4>Shopping Cart</h4>
      <div class="list-group mb-3">
        <!-- Cart Item Example 1 -->
        <div class="list-group-item d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-3">
            <div class="ratio ratio-1x1" style="width:80px; min-width:80px;">
              <img src="assets/images/images.jpg" class="img-fluid rounded object-fit-cover" alt="Product">
            </div>
            <div>
              <h6>Product 1</h6>
              <p class="mb-0 text-muted">$49.99</p>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <input type="number" class="form-control w-25" value="1" min="1">
            <button class="btn btn-danger btn-sm">Remove</button>
          </div>
        </div>

        <!-- Cart Item Example 2 -->
        <div class="list-group-item d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-3">
            <div class="ratio ratio-1x1" style="width:80px; min-width:80px;">
              <img src="assets/images/images.jpg" class="img-fluid rounded object-fit-cover" alt="Product">
            </div>
            <div>
              <h6>Product 2</h6>
              <p class="mb-0 text-muted">$39.99</p>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <input type="number" class="form-control w-25" value="2" min="1">
            <button class="btn btn-danger btn-sm">Remove</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Cart Summary & Coupon -->
    <div class="col-lg-4">
      <!-- Cart Total Summary -->
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">Cart Summary</h5>
          <ul class="list-group list-group-flush mb-3">
            <li class="list-group-item d-flex justify-content-between">
              <span>Subtotal</span>
              <span>$139.97</span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span>Shipping</span>
              <span>$10.00</span>
            </li>
            <li class="list-group-item d-flex justify-content-between fw-bold">
              <span>Total</span>
              <span>$149.97</span>
            </li>
          </ul>
          <button class="btn btn-success w-100">Proceed to Checkout</button>
        </div>
      </div>

      <!-- Coupon Section -->
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Have a Coupon?</h5>
          <div class="input-group">
            <input type="text" class="form-control" placeholder="Enter coupon code">
            <button class="btn btn-primary">Apply</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
